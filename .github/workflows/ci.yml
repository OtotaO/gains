name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install GAINS (dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff
        run: ruff check .

      - name: pytest
        run: pytest -ra

      - name: pip-audit
        run: pip-audit --strict --skip-editable || true

  rust-backend:
    name: Rust backend — fmt + clippy + check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app -> tauri-app/target

      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: cargo fmt --check
        working-directory: tauri-app
        run: cargo fmt --all --check

      - name: cargo clippy
        working-directory: tauri-app/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check
        working-directory: tauri-app/src-tauri
        run: cargo check --all-targets

  rust-frontend:
    name: Leptos WASM — check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app -> tauri-app/target

      - name: cargo check (wasm)
        working-directory: tauri-app
        run: cargo check -p gains-ui --target wasm32-unknown-unknown

  audit:
    name: cargo-audit + cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app -> tauri-app/target

      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: tauri-app/src-tauri/Cargo.toml
          command: check bans licenses advisories sources
