version: 2
updates:
  - package-ecosystem: cargo
    directory: /tauri-app/src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns:
          - "tauri*"
      leptos:
        patterns:
          - "leptos*"

  - package-ecosystem: cargo
    directory: /tauri-app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /tauri-app
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
