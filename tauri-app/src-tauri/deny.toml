# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "deny"
# We care about *security* advisories on transitive deps, but the
# "unmaintained" advisory class produces a steady stream of noise from the
# Tauri/Leptos ecosystem (GTK3 bindings, unic-*, proc-macro-error, …) — all
# tracked upstream, none exploitable. Restrict that one class to direct
# workspace deps; vulnerabilities still fire on every dep.
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
